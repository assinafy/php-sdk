version: '3.8'

services:
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: assinafy-sdk-php
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - assinafy-network
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: assinafy-sdk-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: assinafy_test
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - assinafy-network

  nginx:
    image: nginx:latest
    container_name: assinafy-sdk-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - assinafy-network
    depends_on:
      - php

networks:
  assinafy-network:
    driver: bridge

volumes:
  mysql-data:

